services:
  app:
    build: .
    container_name: calculator2_app
    ports:
      - "8082:3000"
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 2441
      DB_NAME: calculator
      PORT: 3000
    volumes:
      - ./server:/app/server
      - ./public:/app/public
    restart: unless-stopped